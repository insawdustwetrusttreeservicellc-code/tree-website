<html lang="en">

      box-sizing: border-box;

    html {

      background: #0b0b0b;
      color: #ffffff;
      line-height: 1.6;

    a {

      color: inherit;
    }

    img {

    .container {
      width: 90%;

      margin: 0 auto;

    }

    .topbar-text {

      color: #f5f5f5;
      letter-spacing: 0.3px;
    }

    .topbar-phone a {
      color: #ff8c00;
      font-weight: 700;
      font-size: 1rem;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(10, 10, 10, 0.96);

      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
      gap: 20px;
      flex-wrap: wrap;
    }

    .logo {

      color: #ff8c00;

      color: #ff8c00;
    }

      background: linear-gradient(135deg, #ff6a00, #ff9900);
      color: #000;
      font-weight: 800;
      padding: 14px 24px;
      border-radius: 999px;
      transition: 0.25s ease;
      box-shadow: 0 10px 24px rgba(255, 128, 0, 0.25);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 28px rgba(255, 128, 0, 0.35);
    }

    .btn-outline {

      transition: 0.25s ease;

    .btn-outline:hover {

      font-weight: 900;

      color: #f8f8f8;

      font-size: 0.98rem;
